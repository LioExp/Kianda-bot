services:
  - type: web
    name: kiandabot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kiandabot-db
          property: connectionString
      - key: GREEN_API_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: GREEN_API_URL
        sync: false
      - key: APP_BASE_URL
        sync: false

databases:
  - name: kiandabot-db
    databaseName: kiandabot
    plan: free